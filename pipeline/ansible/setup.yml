---
- name: Setup production server
  hosts: production
  become: yes
  gather_facts: yes

  tasks:
    - name: Replace Ubuntu mirror with Yandex mirror for faster updates
      replace:
        path: /etc/apt/sources.list
        regexp: 'archive.ubuntu.com'
        replace: 'mirror.yandex.ru'

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Java 21
      apt:
        name: openjdk-21-jdk
        state: present

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install PostgreSQL
      apt:
        name: postgresql
        state: present

    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create application directory
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: 0755

    - name: Create systemd service file for myapp
      copy:
        dest: /etc/systemd/system/myapp.service
        content: |
          [Unit]
          Description=My Java Application
          After=network.target

          [Service]
          User=ubuntu
          ExecStart=/usr/bin/java -jar /home/ubuntu/myapp.jar
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
        mode: 0644
      notify:
        - reload systemd

    - name: Enable service (will start when jar is present)
      systemd:
        name: myapp
        enabled: yes
        state: stopped

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes